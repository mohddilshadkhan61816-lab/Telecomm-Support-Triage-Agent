# Telecom Support Triage Configurations

categories:
  network_issue:
    - "no signal"
    - "dropped calls"
    - "internet down"
    - "slow speed"
    - "outage"
  billing:
    - "overcharged"
    - "bill"
    - "invoice"
    - "payment"
    - "refund"
  device_support:
    - "sim card"
    - "broken phone"
    - "activation"
    - "upgrade"

priority_keywords:
  critical:
    - "emergency"
    - "business down"
    - "police"
    - "hospital"
    - "lawsuit"
  high:
    - "outage"
    - "no signal"
    - "disconnected completely"
    - "overcharged"
  medium:
    - "slow speed"
    - "dropped calls"
    - "upgrade"
  low:
    - "information"
    - "how to"
    - "bill explanation"

automated_responses:
  critical: "Your query has been escalated to our emergency response team. An agent will contact you within 5 minutes."
  high: "We have marked your issue as high priority. Our technical team is looking into it and will update you shortly."
  medium: "Thank you for reaching out. We have logged your request and an agent will assist you soon."
  low: "Thank you for your query. You can also check our FAQ section while you wait for our support team to respond."
  default: "Thank you for contacting Telecom Support. We will get back to you shortly."